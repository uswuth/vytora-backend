# -------------------------------------------------
# AUDIT TRAIL
# -------------------------------------------------

query AuditTrails(
  $tableName: String
  $recordCode: String
  $action: String
  $changedBy: String
  $dateFrom: String
  $dateTo: String
  $limit: Int
  $offset: Int
) {
  auditTrails(
    tableName: $tableName
    recordCode: $recordCode
    action: $action
    changedBy: $changedBy
    dateFrom: $dateFrom
    dateTo: $dateTo
    limit: $limit
    offset: $offset
  ) {
    id
    code
    tableName
    recordId
    recordCode
    action
    fieldName
    oldValue
    newValue
    changedBy
    changedAt
  }
}

# -------------------------------------------------
# REPORTS
# -------------------------------------------------

query SummaryReport {
  summaryReport {
    totalVendors
    vendorsByStatus {
      key
      value
    }
    vendorsByRiskLevel {
      key
      value
    }
    expiringContracts30
    expiringContracts60
    expiringContracts90
    expiringCompliance30
    expiringCompliance60
    expiringCompliance90
    pendingRiskAssessments
    approvedRiskAssessments
  }
}

query MonthlyOnboarding {
  monthlyOnboarding {
    month
    count
  }
}

query HighRiskVendors {
  highRiskVendors {
    code
    name
    category
    riskLevel
    overallRiskScore
    latestAssessment
    assessmentStatus
    expiringContracts30
  }
}

query ExpiringContractsReport {
  expiringContractsReport {
    code
    vendorName
    vendorCode
    contractNumber
    endDate
    daysRemaining
    renewalStatus
    contractValue
  }
}

query ComplianceSummaryReport {
  complianceSummaryReport {
    certificationType
    approved
    pending
    expired
    total
  }
}

query TimeSeriesReport {
  timeSeriesReport {
    vendors {
      date
      count
    }
    riskAssessments {
      date
      count
    }
    compliance {
      date
      count
    }
  }
}

