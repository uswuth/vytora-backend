  $offset: Int
) {
  riskAssessments(
    vendorCode: $vendorCode
    riskLevel: $riskLevel
    status: $status
    limit: $limit
    offset: $offset
  ) {
    id
    code
    vendorId
    vendorCode
    assessmentDate
    assessorId
    overallRiskScore
    riskLevel
    securityRiskScore
    financialRiskScore
    operationalRiskScore
    legalRiskScore
    status
