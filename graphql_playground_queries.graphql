# ============================================
# VYTORA BACKEND - GraphQL Playground Queries
# Open http://localhost:8080/ in your browser
# ============================================
#
# HOW TO USE:
# 1. Paste a query/mutation in the top "Query" panel
# 2. Paste its variables (if any) in the bottom-left "Variables" panel
# 3. Click the ▶ Play button
#
# QUICK START - Login:
# ┌─ Query (top panel) ─────────────────────────────────────────┐
# │ mutation Login($email: String!, $password: String!) {       │
# │   login(email: $email, password: $password) {              │
# │     token                                                   │
# │     user {                                                  │
# │       id                                                    │
# │       email                                                 │
# │       fullName                                              │
# │       role                                                  │
# │     }                                                       │
# │   }                                                         │
# │ }                                                           │
# └─────────────────────────────────────────────────────────────┘
# ┌─ Variables (bottom-left panel) ─────────────────────────────┐
# │ {                                                           │
# │   "email": "admin@vytora.com",                             │
# │   "password": "your_password_here"                          │
# │ }                                                           │
# └─────────────────────────────────────────────────────────────┘
# ============================================

# -------------------------------------------------
# AUTH
# -------------------------------------------------

mutation Login($email: String!, $password: String!) {
  login(email: $email, password: $password) {
    token
    user {
      id
      email
      fullName
      role
    }
  }
}

mutation ExtendSession {
  extendSession {
    token
    user {
      id
      email
      fullName
      role
    }
  }
}

query Me {
  me {
    id
    code
    email
    fullName
    role
    isActive
    createdAt
    updatedAt
  }
}

# -------------------------------------------------
# USERS
# -------------------------------------------------

query Users {
  users {
    id
    code
    email
    fullName
    role
    isActive
    createdAt
    updatedAt
  }
}

query User($id: ID!) {
  user(id: $id) {
    id
    code
    email
    fullName
    role
    isActive
    createdAt
    updatedAt
  }
}

mutation CreateUser($input: CreateUserInput!) {
  createUser(input: $input) {
    id
    code
    email
    fullName
    role
    isActive
    createdAt
    updatedAt
  }
}

mutation UpdateUserRole($id: ID!, $input: UpdateRoleInput!) {
  updateUserRole(id: $id, input: $input)
}

mutation DeactivateUser($id: ID!) {
  deactivateUser(id: $id)
}

mutation ActivateUser($id: ID!) {
  activateUser(id: $id)
}

# -------------------------------------------------
# CATEGORIES
# -------------------------------------------------

query Categories($search: String, $status: CategoryStatus, $limit: Int, $offset: Int) {
  categories(search: $search, status: $status, limit: $limit, offset: $offset) {
    data {
      id
      code
      name
      displayName
      description
      status
      createdBy
      updatedBy
      createdAt
      updatedAt
    }
    total
  }
}

query Category($code: String!) {
  category(code: $code) {
    id
    code
    name
    displayName
    description
    status
    createdBy
    updatedBy
    createdAt
    updatedAt
  }
}

mutation CreateCategory($input: CreateCategoryInput!) {
  createCategory(input: $input) {
    id
    code
    name
    displayName
    description
    status
    createdBy
    updatedBy
    createdAt
    updatedAt
  }
}

mutation UpdateCategory($code: String!, $input: UpdateCategoryInput!) {
  updateCategory(code: $code, input: $input) {
    id
    code
    name
    displayName
    description
    status
    updatedAt
  }
}

mutation DeleteCategory($code: String!) {
  deleteCategory(code: $code)
}

# -------------------------------------------------
# VENDORS
# -------------------------------------------------

query Vendors(
  $filter: VendorListFilter
  $limit: Int
  $offset: Int
  $sortBy: String
  $sortOrder: String
) {
  vendors(
    filter: $filter
    limit: $limit
    offset: $offset
    sortBy: $sortBy
    sortOrder: $sortOrder
  ) {
    data {
      id
      code
      name
      category
      contactPerson
      contactEmail
      country
      riskLevel
      status
      assignedDeptManagerID
      createdBy
      createdAt
      updatedAt
      contacts {
        id
        code
        name
        email
        phone
        createdAt
      }
      riskAssessments {
        id
        code
        assessmentDate
        overallRiskScore
        riskLevel
        status
      }
      complianceRecords {
        id
        code
        certificationType
        status
        validFrom
        validUntil
      }
      contracts {
        id
        code
        contractNumber
        startDate
        endDate
        contractValue
        renewalStatus
      }
    }
    total
  }
}

query Vendor($code: String!) {
  vendor(code: $code) {
    id
    code
    name
    category
    contactPerson
    contactEmail
    country
    riskLevel
    status
    assignedDeptManagerID
    createdBy
    createdAt
    updatedAt
    contacts {
      id
      code
      name
      email
      phone
      createdAt
    }
    riskAssessments {
      id
      code
      assessmentDate
      overallRiskScore
      riskLevel
      status
    }
    complianceRecords {
      id
      code
      certificationType
      status
      validFrom
      validUntil
    }
    contracts {
      id
      code
      contractNumber
      startDate
      endDate
      contractValue
      renewalStatus
    }
  }
}

mutation CreateVendor($input: CreateVendorInput!) {
  createVendor(input: $input) {
    id
    code
    name
    category
    contactPerson
    contactEmail
    country
    riskLevel
    status
    createdBy
    createdAt
    updatedAt
  }
}

mutation UpdateVendor($code: String!, $input: UpdateVendorInput!) {
  updateVendor(code: $code, input: $input) {
    id
    code
    name
    category
    contactPerson
    contactEmail
    country
    riskLevel
    status
    updatedAt
  }
}

mutation DeleteVendor($code: String!) {
  deleteVendor(code: $code)
}

mutation SubmitVendor($code: String!) {
  submitVendor(code: $code)
}

mutation ReviewVendorRisk($code: String!) {
  reviewVendorRisk(code: $code)
}

mutation ReviewVendorCompliance($code: String!) {
  reviewVendorCompliance(code: $code)
}

mutation ApproveVendor($code: String!) {
  approveVendor(code: $code)
}

mutation RejectVendor($code: String!) {
  rejectVendor(code: $code)
}

